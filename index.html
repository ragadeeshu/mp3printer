<!-- \<!doctype html> -->
<html>
<head>
  <title>mp3 printer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ static_url("favicons/apple-touch-icon.png") }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ static_url("favicons/favicon-32x32.png") }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ static_url("favicons/favicon-16x16.png") }}">
  <link rel="manifest" href="{{ static_url("favicons/site.webmanifest") }}">
  <link rel="shortcut icon" href="{{ static_url("favicons/favicon.ico") }}">
  <meta name="msapplication-TileColor" content="#d0b11b">
  <meta name="msapplication-config" content="{{ static_url("favicons/browserconfig.xml") }}">
  <meta name="theme-color" content="#d0b11b">
  <style type="text/css">
  html {
    overflow-y: auto;
  }

  .child-elements {
    pointer-events: none;
  }
  a {
    pointer-events: auto;
  }

  #page_title h1 {
    display: inline-block;
    margin-top: 0;
    padding: 0 1em 0.25em;
    border-bottom: 1px solid #5a4d0c;
  }
  #page_title h1 * {
    display: inline-block;
    vertical-align: middle;
    font-size: 24px;
  }
  #page_title h1 img {
    width: 24px;
    height: 24px;
    margin: 0 0.5em
  }

  #inputs {
    margin-bottom: 1em;
    display: inline-grid;
    grid-template-columns: repeat(2, max-content);
    align-items: center;
    gap: 0.5em 0.25em;
    text-align: left;
  }
  #inputs label, #inputs input, #inputs button {
    pointer-events: auto;
  }
  #inputs label {
    font-weight: bold;
    color: #806d11;
    text-align: right;
  }
  #inputs input, #inputs button {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;

    border: #D0B11B 1px solid;

    -moz-border-radius: 3px;
    -webkit-border-radius: 3px;
    border-radius: 3px;

    -moz-box-shadow: 0px 0px 3px 0px #D0B11B;
    -webkit-box-shadow: 0px 0px 3px 0px #D0B11B;
    box-shadow: 0px 0px 3px 0px #D0B11B;

    margin: 0.25em;
    padding: 0.25em;
  }
  #inputs input {
    color: #D0B11B;
    text-shadow: 1px 1px 1px #000;
    background: #222;
  }
  #inputs button {
    background: #D0B11B;
    color: #222;
    text-shadow: 1px 1px 1px #000;
    cursor: pointer;
    text-align: center;
  }
  #inputs button:hover {
    background: #f7d321;
  }
  #inputs button:active {
    background: #806d11;
  }
  #inputs #file_selector {
    display: none;
  }
  #inputs #upload_hint {
    font-size: 0.8em;
    color: #5a4d0c;
  }

  #connection_details {
    color: #D01B1B;
    margin-bottom: 1em;
  }

  #errors p {
    margin: 0;
  }

  #errors div {
    display: inline-block;
    padding: 0.25em;

    text-align: left;

    border: #D01B1B 1px solid;

    -moz-border-radius: 3px;
    -webkit-border-radius: 3px;
    border-radius: 3px;

    -moz-box-shadow: 0px 0px 3px 0px #D01B1B;
    -webkit-box-shadow: 0px 0px 3px 0px #D01B1B;
    box-shadow: 0px 0px 3px 0px #D01B1B;

    margin: 0.25em 0;
  }

  #errors div::before {
    content: 'Error: ';
    font-weight: bold;
  }
  #errors div:empty::after {
    content: 'Unknown error.';
  }

  #foot{
    padding: 1em;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin: 0px;
    width: 100%;
    box-shadow: inset 1px 1px 40px 1px rgba(0,0,0,.45);
    background: #000;
    color: #D0B11B;
    background-size: cover;
    overflow: hidden;
    /*Below is footer magic*/
    display: flex;
    min-height: 100vh;
    flex-direction: column;
  }

  #drop-overlay, #busy-overlay {
    box-sizing: border-box;
    -moz-box-sizing: border-box;
    -webkit-box-sizing: border-box;
    width: 100%;
    height: 100%;
    z-index: 6;
    display: none;
    content: "";
    position: fixed;
    background: rgba(0,0,0,.75);
    text-align: center;
    font-weight: bold;
    text-align: center;
    color: #D0B11B;
    cursor: default;
    font-size: 3em;
  }
  #drop-overlay::after, #busy-overlay::after {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    margin-top: -1em;
  }

  #drop-overlay {
    border: 10px dashed #D0B11B;
  }
  #drop-overlay::after {
    content: 'Drop files of links here to add them to the queue';
  }

  #busy-overlay::after {
    content: 'Adding tracks to queue...';
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0% { opacity: 1.0; }
    50% { opacity: 0.25; }
    100% { opacity: 1.0; }
  }

  #page_body {
    padding: 1em;
    /*Footer magic*/
    flex: 1;
  }

  </style>
  <link rel="stylesheet" type="text/css" href="{{ static_url("table.css") }}">
  <link rel="stylesheet" type="text/css" href="{{ static_url("progress.css") }}">
  <script src="http://code.jquery.com/jquery.min.js"></script>
  <script src="{{ static_url("cookie.js") }}"></script>
  <script type="text/javascript">
  var myaddress = null;

  function disclaimer(){
    $('#disclaimer').text(cookies[cookieindex]);
    cookieindex++;
    cookieindex%=cookies.length;
  }

  function addTable(list, position) {
    var table = $('<table></table>').addClass('printtable');
    var headerRow = $('<tr></tr>');
    var headers = ['Track','Progress','User', 'Prio'];
    for (var i=0; i<headers.length; i++){
      var header = $('<th></th>').text(headers[i]);
      headerRow.append(header);
    }
    table.append(headerRow);

    for (var i=0; i<list.length; i++){
      var curr = list[i];
      var row = $('<tr></tr>')
        .appendTo(table);
      var nameCell = $('<td></td>')
        .appendTo(row);
      if (curr['address'] == myaddress){
        var prefix = $('<code></code>');
        prefix.append('[');
        prefix.append($('<a></a>', {
          text: 'X',
          title: 'Cancel song',
          href: '#',
          data: { id: curr['id'] },
          click: function(event) {
            event.preventDefault();
            var skipMessage={
              'type': 'skip',
              'id': $(event.target).data('id')
            };
            sendWS(JSON.stringify(skipMessage));
          }
        }));
        prefix.append(']');
        nameCell.append(prefix);
        nameCell.append('\u00A0'); // &nbsp;
      }
      nameCell.append($('<a></a>', {
        target: '_blank',
        href: 'download/'+encodeURIComponent(curr['id']),
        text: curr['title']
      }));

      var meterCell = $('<td></td>')
        .appendTo(row);
      var meter = $('<div></div>', { class: 'meter' })
        .appendTo(meterCell);
      if (i == 0) {
        meter.append($('<span></span>', {
          id: 'progress',
          css: { width: (position*100)+'%'}
        }));
      }

      var address = curr['address'] ? curr['address'] : '?';
      row.append($('<td></td>', {
        text: (curr['nick']
          ? curr['nick']+'\u00A0('+address+')'
          : address)
      }));

      row.append($('<td></td>', {
        text: curr['prio']
      }));
    }

    $('#printlist').html(table).delay(1).promise().done(function() {
      $('#printlist').fadeTo(400, 1);
    });
  }

  var lastDragTarget = null;
  var overlayTimeout = null;
  var ongoingUploads = 0;

  function fileDragHover(e) {
    e.stopPropagation();
    e.preventDefault();
    var overlay = $('#drop-overlay');
    if(e.type == 'dragover'){
      lastDragTarget = e.target;
      if(!overlay.is(':visible')) {
        overlay.stop(true).fadeIn('fast');
      } else if(overlayTimeout) {
        clearTimeout(overlayTimeout);
      }
    } else if(e.type == 'dragleave' && $(e.target).is(lastDragTarget)){
      clearTimeout(overlayTimeout);
      overlayTimeout = setTimeout(function() {
        if(overlay.is(':visible')) {
          overlay.stop(true).fadeOut('fast');
        }
      }, 10);
    }
  }

  function fileDropHandler(e) {
    e.stopPropagation();
    e.preventDefault();
    $('#drop-overlay').stop(true).fadeOut('fast');
    var dt = e.originalEvent.dataTransfer;
    if (dt && dt.items) {
      var items = dt.items;
      if (items.length < 1) {
        addError('You seem to have dragged nothing, please try again.');
      }
      var uploads = [];
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        if (item.kind == 'file') {
          if (!addFile(item.getAsFile(), uploads)) {
            return false;
          }
        } else if (item.kind == 'string' && item.type == 'text/plain') {
          var lines = dt.getData('text/plain').split('\n');
          for (var l = 0; l < lines.length; l++) {
            if (!addLink(lines[l], uploads)) {
              return false;
            }
          }
        }
      }
      uploadTracks(uploads);
    }
    else {
      addError('Please upgrade your browser...');
    }
  }

  function fileInputHandler(files) {
    var uploads = [];
    for (var i = 0; i < files.length; i++) {
      if (!addFile(files[i], uploads)) {
        return false;
      }
    }
    uploadTracks(uploads);
  }

  function linkInputHandler(link) {
    if (!link) { return; }
    var uploads = [];
    if (!addLink(link, uploads)) {
      return false;
    }
    uploadTracks(uploads);
  }

  function addFile(file, uploads) {
    if (file.size > 0) {
      uploads.push({ 'type': 'file', 'file': file });
    }
    return true;
  }

  function addLink(link, uploads) {
    var re_host = window.location.host.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
    var host_match = new RegExp('^https?://' + re_host);
    if (!link.match(host_match)) {
      uploads.push({ 'type': 'link', 'link': link });
    }
    return true;
  }

  function uploadId(nick, name) {
    return nick + ':' + name + ':' + ((new Date()).getTime() + Math.random());
  }

  function uploadTracks(uploads) {
    if (uploads.length > 10) {
      addError('Please, no more than 10 tracks at a time.');
      return false;
    }
    var nick = $('#nickname').val();
    var last_id = null;
    startUploads(uploads.length);
    for (var i = 0; i < uploads.length; i++) {
      var upload = uploads[i];
      try {
        var req = new XMLHttpRequest();
        req.onreadystatechange = function (aEvt) {
          if (req.readyState == 4) {
            uploadDone();
            if (req.status != 200) {
              addError(req.responseText);
            }
          }
        };
        var id, body;
        switch(upload.type) {
        case 'file':
          id = uploadId(nick, upload.file.name);
          body = upload.file;
          req.open('put', 'add-file', true);
          req.setRequestHeader('Filename', upload.file.name);
          req.setRequestHeader('Content-Type', upload.file.type);
          break;
        case 'link':
          id = uploadId(nick, upload.link);
          body = upload.link;
          req.open('post', 'add-link', true);
          break;
        default:
          throw new Error("Unsupported type '"+upload.type+"'");
        }
        req.setRequestHeader('Nick', nick);
        req.setRequestHeader('Upload-Id', id);
        if (last_id) {
          req.setRequestHeader('Parent-Id', last_id);
        }
        req.send(body);
        last_id = id;
      } catch(err) {
        addError(err.message);
        uploadDone();
      }
    }
  }

  function startUploads(count) {
    ongoingUploads += count;
    if (ongoingUploads > 0) {
      var overlay = $('#busy-overlay');
      if(!overlay.is(':visible')) {
        overlay.stop(true).fadeIn('fast');
      }
    }
  }

  function uploadDone() {
    if (ongoingUploads > 0) {
      ongoingUploads--;
    }
    if (ongoingUploads <= 0) {
      ongoingUploads = 0;
      $('#busy-overlay').stop(true).fadeOut('fast');
    }
  }

  function addError(msg) {
    var line = $('<p></p>')
      .prependTo($('#errors'));
    var error = $('<div></div>')
      .text(msg)
      .hide()
      .appendTo(line);
    error.fadeIn('slow');
    setTimeout(function(){
      line.fadeOut('slow', function() { line.remove(); });
    }, 15000);
  }

  // Websocket stuff
  var ws;
  var wsQueue = [];
  function connectWS() {
    console.log('Connecting to WebSocket...');
    ws = new WebSocket('ws://' + window.location.host + '/ws');
    ws.onmessage = function(evt) {
      var message = JSON.parse(evt.data);
      switch(message.type){
      case 'address':
        myaddress = message.address;
        break;
      case 'fallback':
        $('#printlist').text(message.description);
        break;
      case 'list':
        $('div#printlist').fadeTo(400, 0).promise().done(
            function() {
              addTable(message.list, message.position);
            });
        break;
      case 'progress':
        $('#progress').animate({width: message.position*100+'%'}, 100);
        break;
      case 'error':
        addError(message.message);
        break;
      default:
        console.warn('Unknown message type: ' + message.type);
        break;
      }
    };

    ws.onclose = function(evt) {
      console.log('WebSocket connection closed, reconnecting in 10 seconds.');
      $('div#printlist').fadeOut('slow');
      $('#inputs').fadeOut('slow');
      $('#connection').fadeIn('slow');

      setTimeout(connectWS, 10000);
    };

    ws.onopen = function(evt) {
      console.log('WebSocket connection opened.');

      $('div#printlist').fadeIn('slow');
      $('#inputs').fadeIn('slow');
      $('#connection').fadeOut('slow');

      var queue = wsQueue;
      wsQueue = [];
      for (var i = 0; i < queue.length; i++) {
        sendWS(queue[i]);
      }
    };
  }
  function sendWS(message) {
    if (ws.readyState == WebSocket.OPEN) {
      ws.send(message);
    } else {
      wsQueue.push(message);
    }
  }


  // begin page load code
  $(document).ready(function () {
    $('div#printlist').hide();
    $('#connection').show();
    $('#inputs').hide();

    var nick = getCookie('nick');
    if (nick != null){
      $('#nickname').val(nick);
    }
    $('#nickname').on('propertychange change keyup paste input', function(evt) {
      setCookie('nick', $('#nickname').val())
    });

    var selector = $('#file_selector');
    $('#upload_file').click(function() {
      selector.click();
    });
    selector.on('change', function() {
      fileInputHandler(selector.get(0).files);
    })
    $('#upload_link').click(function() {
      linkInputHandler(prompt('Link URL:'));
    });

    setInterval(disclaimer, 120);

    connectWS();

    $('html').on('dragover', fileDragHover);
    $('html').on('dragleave', fileDragHover);
    $('html').on('drop', fileDropHandler);
  });
  </script>
</head>

<body>
  <div id="busy-overlay" class="child-elements"></div>
  <div id="drop-overlay" class="child-elements"></div>
  <section id="page_body" class="child-elements">
    <div id="page_title">
      <h1>
        <img src="{{ static_url("favicons/favicon.svg") }}">
        <div>mp3 printer</div>
        <img src="{{ static_url("favicons/favicon.svg") }}">
      </h1>
    </div>
    <div id="inputs">
      <label for="nickname">Name</label>
      <input id="nickname" type="text" placeholder="Your name here...">
      <label>Add</label>
      <div>
        <input id="file_selector" type="file" multiple>
        <button id="upload_file">File(s)</button>
        <button id="upload_link">Link</button>
        <span id="upload_hint">(Or drag files/links into this window)</span>
      </div>
    </div>
    <div id="connection_details">
      <label id="connection">NO CONNECTION<br>Wait a while, or refresh the page.</label>
      <div id="errors"></div>
    </div>
    <div id ="printlist">
    </div>
    <div id="terminal">
    </div>
  </section>
  <div id="foot">
    <pre><code id="disclaimer"></code></pre>
  </div>
</body>
</html>
